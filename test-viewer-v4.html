<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure PDF Viewer V4 (Ultimate)</title>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.js"></script>

    <!-- Annotate -->
    <script src="https://cdn.jsdelivr.net/npm/pdf-annotate.js@1.0.1/dist/pdf-annotate.min.js"></script>

    <!-- Icons & Tooltips -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale.css" />

    <style>
        :root {
            --primary: #FFCA28;
            --bg: #121212;
            --surface: rgba(30, 30, 30, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* Floating Toolbar settings */
        .floating-toolbar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 100px;
            /* Pill shape */
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .floating-toolbar:hover {
            background: rgba(40, 40, 40, 0.95);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
            transform: translateX(-50%) translateY(-2px);
        }

        .tool-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .tool-btn.active {
            background: var(--primary);
            color: #000;
            transform: scale(1.1);
        }

        .separator {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 8px;
        }

        /* Viewer Container */
        #viewerContainer {
            flex: 1;
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            overflow: auto;
        }

        .pdfViewer .page {
            border: none !important;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5) !important;
            margin: 20px auto !important;
        }

        /* SVG Layer */
        .wrapper {
            position: relative;
        }

        .annotation-layer {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
            cursor: crosshair;
        }

        /* Upload box */
        #upload-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .upload-card {
            padding: 40px 60px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .upload-card:hover {
            border-color: var(--primary);
            background: rgba(255, 202, 40, 0.05);
        }
    </style>
</head>

<body>

    <!-- Floating Top Bar -->
    <div class="floating-toolbar">
        <button class="tool-btn" id="cursor" data-tippy-content="Select">
            <span class="material-icons-round">near_me</span>
        </button>

        <div class="separator"></div>

        <button class="tool-btn" id="highlight" data-tippy-content="Highlighter">
            <span class="material-icons-round">edit</span>
        </button>
        <button class="tool-btn" id="pen" data-tippy-content="Pen">
            <span class="material-icons-round">brush</span>
        </button>
        <button class="tool-btn" id="text" data-tippy-content="Add Text">
            <span class="material-icons-round">text_fields</span>
        </button>

        <div class="separator"></div>

        <button class="tool-btn" id="undo" data-tippy-content="Undo">
            <span class="material-icons-round">undo</span>
        </button>
        <button class="tool-btn" id="clear" data-tippy-content="Clear All">
            <span class="material-icons-round">cleaning_services</span>
        </button>

        <div class="separator"></div>

        <button class="tool-btn" id="fullscreen" data-tippy-content="Fullscreen">
            <span class="material-icons-round">fullscreen</span>
        </button>
    </div>

    <!-- Viewer -->
    <div id="viewerContainer">
        <div id="viewer" class="pdfViewer"></div>
    </div>

    <!-- Upload -->
    <div id="upload-overlay">
        <div class="upload-card" onclick="document.getElementById('fileIn').click()">
            <span class="material-icons-round"
                style="font-size: 64px; margin-bottom: 20px; color: gold;">picture_as_pdf</span>
            <h2>Select PDF</h2>
            <p style="color: #888">Ready-made, Optimized, Polished</p>
            <input type="file" id="fileIn" hidden accept=".pdf">
        </div>
    </div>

    <script>
        // Init Tippy
        tippy('[data-tippy-content]', { animation: 'scale', theme: 'translucent' });

        // PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const container = document.getElementById('viewerContainer');
        const eventBus = new pdfjsViewer.EventBus();
        const linkService = new pdfjsViewer.PDFLinkService({ eventBus });

        const pdfViewer = new pdfjsViewer.PDFViewer({
            container,
            eventBus,
            linkService,
            removePageBorders: true
        });

        linkService.setViewer(pdfViewer);

        // Upload Logic
        document.getElementById('fileIn').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('upload-overlay').style.display = 'none';

            const buf = await file.arrayBuffer();
            const doc = await pdfjsLib.getDocument(buf).promise;
            pdfViewer.setDocument(doc);
        };

        // Tool Logic
        let currentTool = 'cursor';
        const tools = ['cursor', 'highlight', 'pen', 'text'];

        tools.forEach(t => {
            document.getElementById(t).onclick = () => {
                tools.forEach(x => document.getElementById(x).classList.remove('active'));
                document.getElementById(t).classList.add('active');
                currentTool = t;
                // Here is where we switch `pdf-annotate` mode
                // Since this is a UI demo, we toggle active state
            };
        });

        document.getElementById('fullscreen').onclick = () => {
            if (document.fullscreenElement) document.exitFullscreen();
            else document.body.requestFullscreen();
        };

        // Note: Full Integration of Annotations
        // We need to inject SVG layers into .page divs created by pdfViewer
        eventBus.on('pageinit', (evt) => {
            const pageDiv = evt.source.div;
            // create SVG layer
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.style.position = 'absolute';
            svg.style.top = '0';
            svg.style.left = '0';
            svg.style.width = '100%';
            svg.style.height = '100%';
            svg.style.zIndex = '10';
            svg.classList.add('annotation-layer');
            pageDiv.appendChild(svg);

            // Simple interaction demo
            svg.onmousedown = (e) => {
                if (currentTool === 'pen') {
                    // Draw logic...
                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    const rect = pageDiv.getBoundingClientRect();
                    circle.setAttribute('cx', e.clientX - rect.left);
                    circle.setAttribute('cy', e.clientY - rect.top);
                    circle.setAttribute('r', 5);
                    circle.setAttribute('fill', 'gold');
                    svg.appendChild(circle);
                }
            };
        });

        console.log("V4 Loaded");
    </script>
</body>

</html>
