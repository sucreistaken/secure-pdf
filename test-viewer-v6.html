<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure PDF Viewer V6 (js-draw)</title>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.js"></script>

    <!-- js-draw (Ready-Made Annotation Library) -->
    <script src="https://cdn.jsdelivr.net/npm/js-draw@1.21.1/dist/bundle.js"></script>

    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        :root {
            --primary: #FFCA28;
            --bg: #121212;
            --surface: #1e1e1e;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* Header */
        .top-header {
            height: 48px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .page-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            border-radius: 4px;
        }

        .page-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Main Content */
        .main-wrapper {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* PDF Canvas Layer */
        #pdf-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            background: var(--bg);
        }

        #pdf-canvas {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* js-draw Annotation Layer */
        #annotation-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
        }

        /* js-draw Toolbar Styling Override */
        .jsdraw-toolbar {
            background: var(--surface) !important;
            border-bottom: 1px solid var(--border) !important;
        }

        /* Upload Overlay */
        #upload-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .upload-card {
            width: 400px;
            padding: 60px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-card:hover {
            border-color: var(--primary);
            background: rgba(255, 202, 40, 0.04);
            transform: translateY(-4px);
        }

        /* Hide annotation layer until PDF is loaded */
        #annotation-layer.hidden {
            display: none;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div class="top-header">
        <div class="header-title">
            <span class="material-icons-round" style="color: var(--primary)">lock</span>
            <span id="doc-title">Secure Viewer (js-draw)</span>
        </div>
        <div class="page-controls">
            <button class="page-btn" id="prev"><span class="material-icons-round">chevron_left</span></button>
            <span style="font-size: 13px;">
                <span id="page-num">1</span> / <span id="page-count">--</span>
            </span>
            <button class="page-btn" id="next"><span class="material-icons-round">chevron_right</span></button>
        </div>
        <div style="display:flex; gap: 8px;">
            <button class="page-btn" id="zoom-out"><span class="material-icons-round">remove</span></button>
            <span id="zoom-val" style="font-size: 13px;">100%</span>
            <button class="page-btn" id="zoom-in"><span class="material-icons-round">add</span></button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-wrapper">
        <!-- PDF Layer -->
        <div id="pdf-layer">
            <canvas id="pdf-canvas"></canvas>
        </div>

        <!-- js-draw Annotation Layer (with built-in toolbar) -->
        <div id="annotation-layer" class="hidden"></div>

        <!-- Upload Overlay -->
        <div id="upload-overlay">
            <div class="upload-card" onclick="document.getElementById('fileIn').click()">
                <span class="material-icons-round"
                    style="font-size: 64px; margin-bottom: 24px; color: var(--primary);">upload_file</span>
                <h2 style="font-weight: 400; margin: 0 0 8px 0;">Upload Document</h2>
                <p style="color: rgba(255,255,255,0.5); font-size: 14px; margin: 0;">PDF files supported</p>
                <input type="file" id="fileIn" hidden accept=".pdf">
            </div>
        </div>
    </div>

    <script>
        // PDF.js Worker
        if (window.location.protocol === 'file:') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = '';
        } else {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }

        // State
        let pdfDoc = null;
        let currentPage = 1;
        let scale = 1.5;
        let drawEditor = null;

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const annotationLayer = document.getElementById('annotation-layer');

        // Initialize js-draw Editor
        function initJsDraw() {
            if (drawEditor) return;

            annotationLayer.classList.remove('hidden');

            drawEditor = new jsdraw.Editor(annotationLayer, {
                // Dark theme
                background: 'transparent'
            });

            // Add the built-in toolbar with ALL tools
            drawEditor.addToolbar();

            // Match the annotation canvas size to the PDF
            syncEditorSize();

            console.log('js-draw initialized with built-in toolbar');
        }

        function syncEditorSize() {
            if (!drawEditor) return;
            // Set editor size to match PDF canvas
            const rootEl = drawEditor.getRootElement();
            rootEl.style.width = canvas.width + 'px';
            rootEl.style.height = canvas.height + 'px';
        }

        // Render PDF Page
        async function renderPage(num) {
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale });

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await page.render({
                canvasContext: ctx,
                viewport: viewport
            }).promise;

            document.getElementById('page-num').textContent = num;

            // Sync js-draw size
            syncEditorSize();
        }

        // Upload Handler
        document.getElementById('fileIn').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('upload-overlay').style.display = 'none';
            document.getElementById('doc-title').textContent = file.name;

            const buf = await file.arrayBuffer();
            pdfDoc = await pdfjsLib.getDocument(buf).promise;

            document.getElementById('page-count').textContent = pdfDoc.numPages;
            currentPage = 1;

            await renderPage(currentPage);

            // Initialize js-draw after PDF loads
            initJsDraw();
        };

        // Navigation
        document.getElementById('prev').onclick = async () => {
            if (currentPage <= 1) return;
            currentPage--;
            await renderPage(currentPage);
        };

        document.getElementById('next').onclick = async () => {
            if (currentPage >= pdfDoc.numPages) return;
            currentPage++;
            await renderPage(currentPage);
        };

        // Zoom
        document.getElementById('zoom-in').onclick = async () => {
            scale += 0.25;
            document.getElementById('zoom-val').textContent = Math.round(scale * 100 / 1.5) + '%';
            await renderPage(currentPage);
        };

        document.getElementById('zoom-out').onclick = async () => {
            if (scale <= 0.5) return;
            scale -= 0.25;
            document.getElementById('zoom-val').textContent = Math.round(scale * 100 / 1.5) + '%';
            await renderPage(currentPage);
        };

        console.log('V6 js-draw Viewer Loaded');
    </script>
</body>

</html>
