<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure PDF Viewer - pdf-annotate.js</title>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>

    <!-- pdf-annotate.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/pdf-annotate.js@1.0.1/dist/pdf-annotate.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 300;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .viewer-wrapper {
            display: flex;
            gap: 20px;
        }

        /* ==================== SIDEBAR TOOLBAR ==================== */
        .sidebar-toolbar {
            width: 60px;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 16px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: fit-content;
            position: sticky;
            top: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tool-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tool-section-label {
            font-size: 9px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            margin-top: 8px;
            margin-bottom: 4px;
        }

        .tool-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.7);
            position: relative;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .tool-btn.active {
            background: rgba(255, 204, 0, 0.2);
            color: #ffcc00;
        }

        .tool-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 50px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 100;
        }

        .tool-btn:hover::after {
            opacity: 1;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 8px 0;
        }

        /* Color palette */
        .color-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            padding: 8px 0;
        }

        .color-btn {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .color-btn:hover,
        .color-btn.active {
            transform: scale(1.2);
            border-color: #fff;
        }

        /* Size slider */
        .size-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 0;
        }

        .size-slider {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 20px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .size-value {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* ==================== PDF CONTAINER ==================== */
        .pdf-container {
            flex: 1;
            background: #1e1e1e;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .pdf-header {
            background: rgba(20, 20, 20, 0.95);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .pdf-title {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .page-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .page-input {
            width: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            padding: 4px 8px;
            color: #fff;
            text-align: center;
            font-size: 13px;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .zoom-level {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            min-width: 50px;
            text-align: center;
        }

        #pdf-viewer {
            height: 75vh;
            overflow: auto;
            background: #2a2a2a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 20px;
        }

        .page-container {
            position: relative;
            background: #fff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .page-container canvas {
            display: block;
        }

        .annotation-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .annotation-layer svg {
            position: absolute;
            top: 0;
            left: 0;
        }

        /* ==================== FILE INPUT ==================== */
        .file-input-area {
            padding: 60px;
            text-align: center;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            margin: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-input-area:hover {
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.05);
        }

        .file-input-area input {
            display: none;
        }

        .file-input-area .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .file-input-area p {
            color: rgba(255, 255, 255, 0.6);
        }

        /* Annotations styles */
        .annotation--highlight {
            fill: rgba(255, 235, 59, 0.4);
        }

        .annotation--strikeout {
            stroke: #f44336;
            stroke-width: 2;
        }

        .annotation--underline {
            stroke: #2196f3;
            stroke-width: 2;
        }

        .annotation--drawing path {
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .annotation--point {
            cursor: pointer;
        }

        .annotation--textbox rect {
            fill: rgba(255, 255, 255, 0.9);
            stroke: #333;
        }

        .annotation--area rect {
            fill: rgba(255, 204, 0, 0.2);
            stroke: #ffcc00;
            stroke-dasharray: 4;
        }

        /* Comment overlay */
        .comment-box {
            position: absolute;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            padding: 12px;
            min-width: 200px;
            z-index: 1000;
        }

        .comment-box textarea {
            width: 100%;
            min-height: 60px;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 8px;
            font-size: 13px;
            resize: vertical;
        }

        .comment-box button {
            margin-top: 8px;
            padding: 6px 12px;
            background: #ffcc00;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔒 Secure PDF Viewer - pdf-annotate.js</h1>

        <div class="viewer-wrapper">
            <!-- Sidebar Toolbar (B style) -->
            <div class="sidebar-toolbar">
                <div class="tool-section">
                    <button class="tool-btn" id="cursor-tool" data-tool="cursor" data-tooltip="Select (V)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M7 2l12 11.2-5.8.5 3.3 7.3-2.2 1-3.2-7.4L7 18.5V2z" />
                        </svg>
                    </button>
                </div>

                <div class="divider"></div>

                <span class="tool-section-label">Markup</span>
                <div class="tool-section">
                    <button class="tool-btn" data-tool="highlight" data-tooltip="Highlight (H)">🖍️</button>
                    <button class="tool-btn" data-tool="underline" data-tooltip="Underline (U)">
                        <span style="text-decoration: underline;">U</span>
                    </button>
                    <button class="tool-btn" data-tool="strikeout" data-tooltip="Strikeout (S)">
                        <span style="text-decoration: line-through;">S</span>
                    </button>
                </div>

                <div class="divider"></div>

                <span class="tool-section-label">Draw</span>
                <div class="tool-section">
                    <button class="tool-btn" data-tool="pen" data-tooltip="Pen (P)">✏️</button>
                    <button class="tool-btn" data-tool="eraser" data-tooltip="Eraser (E)">🧹</button>
                    <button class="tool-btn" data-tool="rectangle" data-tooltip="Rectangle (R)">▢</button>
                    <button class="tool-btn" data-tool="circle" data-tooltip="Circle (C)">○</button>
                    <button class="tool-btn" data-tool="arrow" data-tooltip="Arrow (A)">↗</button>
                </div>

                <div class="divider"></div>

                <span class="tool-section-label">Text</span>
                <div class="tool-section">
                    <button class="tool-btn" data-tool="text" data-tooltip="Text Box (T)">T</button>
                    <button class="tool-btn" data-tool="comment" data-tooltip="Comment (N)">💬</button>
                </div>

                <div class="divider"></div>

                <span class="tool-section-label">Color</span>
                <div class="color-palette">
                    <button class="color-btn active" style="background: #ffeb3b" data-color="#ffeb3b"></button>
                    <button class="color-btn" style="background: #4caf50" data-color="#4caf50"></button>
                    <button class="color-btn" style="background: #2196f3" data-color="#2196f3"></button>
                    <button class="color-btn" style="background: #e91e63" data-color="#e91e63"></button>
                    <button class="color-btn" style="background: #9c27b0" data-color="#9c27b0"></button>
                    <button class="color-btn" style="background: #ff5722" data-color="#ff5722"></button>
                    <button class="color-btn" style="background: #000000" data-color="#000000"></button>
                    <button class="color-btn" style="background: #ffffff; border: 1px solid #ccc"
                        data-color="#ffffff"></button>
                </div>

                <div class="divider"></div>

                <span class="tool-section-label">Size</span>
                <div class="size-control">
                    <input type="range" class="size-slider" id="size-slider" min="1" max="20" value="3"
                        orient="vertical">
                    <span class="size-value" id="size-value">3px</span>
                </div>

                <div class="divider"></div>

                <div class="tool-section">
                    <button class="tool-btn" data-action="undo" data-tooltip="Undo (Ctrl+Z)">↩️</button>
                    <button class="tool-btn" data-action="redo" data-tooltip="Redo (Ctrl+Y)">↪️</button>
                    <button class="tool-btn" data-action="clear" data-tooltip="Clear All">🗑️</button>
                </div>

                <div class="divider"></div>

                <div class="tool-section">
                    <button class="tool-btn" data-action="save" data-tooltip="Save Annotations">💾</button>
                    <button class="tool-btn" data-action="download" data-tooltip="Download PDF">📥</button>
                </div>
            </div>

            <!-- PDF Container -->
            <div class="pdf-container">
                <div class="pdf-header">
                    <span class="pdf-title" id="pdf-title">PDF dosyası seçin</span>
                    <div class="header-controls">
                        <div class="page-nav">
                            <button class="page-btn" id="prev-page">‹</button>
                            <input type="number" class="page-input" id="page-input" value="1" min="1">
                            <span style="color: rgba(255,255,255,0.5)">/</span>
                            <span id="total-pages" style="color: rgba(255,255,255,0.5)">-</span>
                            <button class="page-btn" id="next-page">›</button>
                        </div>
                        <div class="zoom-controls">
                            <button class="page-btn" id="zoom-out">−</button>
                            <span class="zoom-level" id="zoom-level">100%</span>
                            <button class="page-btn" id="zoom-in">+</button>
                        </div>
                        <button class="page-btn" id="fullscreen-btn" data-tooltip="Fullscreen">⛶</button>
                    </div>
                </div>

                <div id="pdf-viewer">
                    <div class="file-input-area" id="file-input-area">
                        <input type="file" id="pdf-file-input" accept=".pdf">
                        <div class="icon">📄</div>
                        <p><strong>PDF dosyası seçin</strong></p>
                        <p style="font-size: 12px; margin-top: 8px;">veya sürükleyip bırakın</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // PDF.js worker setup
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // State
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let currentScale = 1.0;
        let currentTool = 'cursor';
        let currentColor = '#ffeb3b';
        let currentSize = 3;
        let annotations = {}; // pageNum -> [annotations]
        let undoStack = [];
        let redoStack = [];

        // DOM Elements
        const viewer = document.getElementById('pdf-viewer');
        const fileInputArea = document.getElementById('file-input-area');
        const fileInput = document.getElementById('pdf-file-input');
        const pdfTitle = document.getElementById('pdf-title');
        const pageInput = document.getElementById('page-input');
        const totalPagesSpan = document.getElementById('total-pages');
        const zoomLevelSpan = document.getElementById('zoom-level');
        const sizeSlider = document.getElementById('size-slider');
        const sizeValue = document.getElementById('size-value');

        // File input handlers
        fileInputArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFileSelect);

        // Drag and drop
        fileInputArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileInputArea.style.borderColor = '#ffcc00';
        });
        fileInputArea.addEventListener('dragleave', () => {
            fileInputArea.style.borderColor = 'rgba(255,255,255,0.2)';
        });
        fileInputArea.addEventListener('drop', (e) => {
            e.preventDefault();
            fileInputArea.style.borderColor = 'rgba(255,255,255,0.2)';
            if (e.dataTransfer.files[0]) {
                loadPDF(e.dataTransfer.files[0]);
            }
        });

        function handleFileSelect(e) {
            if (e.target.files[0]) {
                loadPDF(e.target.files[0]);
            }
        }

        async function loadPDF(file) {
            pdfTitle.textContent = file.name;
            const arrayBuffer = await file.arrayBuffer();
            pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            totalPages = pdfDoc.numPages;
            totalPagesSpan.textContent = totalPages;
            pageInput.max = totalPages;

            fileInputArea.style.display = 'none';

            // Render all pages
            await renderAllPages();
        }

        async function renderAllPages() {
            // Clear existing
            const existingPages = viewer.querySelectorAll('.page-container');
            existingPages.forEach(p => p.remove());

            for (let num = 1; num <= totalPages; num++) {
                await renderPage(num);
            }
        }

        async function renderPage(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: currentScale * 1.5 });

            // Create page container
            const container = document.createElement('div');
            container.className = 'page-container';
            container.dataset.pageNumber = pageNum;
            container.style.width = viewport.width + 'px';
            container.style.height = viewport.height + 'px';

            // PDF canvas
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');

            await page.render({
                canvasContext: ctx,
                viewport: viewport
            }).promise;

            container.appendChild(canvas);

            // Create SVG annotation layer
            const svgLayer = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svgLayer.setAttribute('class', 'annotation-layer');
            svgLayer.setAttribute('width', viewport.width);
            svgLayer.setAttribute('height', viewport.height);
            svgLayer.style.width = viewport.width + 'px';
            svgLayer.style.height = viewport.height + 'px';
            container.appendChild(svgLayer);

            // Setup drawing
            setupDrawing(svgLayer, pageNum, viewport.width, viewport.height);

            viewer.appendChild(container);

            // Load saved annotations
            loadPageAnnotations(pageNum, svgLayer);
        }

        function setupDrawing(svg, pageNum, width, height) {
            let isDrawing = false;
            let currentPath = null;
            let pathData = '';
            let startX, startY;

            svg.addEventListener('mousedown', (e) => {
                if (currentTool === 'cursor') return;

                isDrawing = true;
                const rect = svg.getBoundingClientRect();
                startX = e.clientX - rect.left;
                startY = e.clientY - rect.top;

                if (currentTool === 'pen') {
                    currentPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    currentPath.setAttribute('stroke', currentColor);
                    currentPath.setAttribute('stroke-width', currentSize);
                    currentPath.setAttribute('fill', 'none');
                    currentPath.setAttribute('stroke-linecap', 'round');
                    currentPath.setAttribute('stroke-linejoin', 'round');
                    pathData = `M ${startX} ${startY}`;
                    currentPath.setAttribute('d', pathData);
                    svg.appendChild(currentPath);
                } else if (currentTool === 'highlight') {
                    // Text area selection simulation
                    currentPath = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    currentPath.setAttribute('x', startX);
                    currentPath.setAttribute('y', startY);
                    currentPath.setAttribute('width', 0);
                    currentPath.setAttribute('height', 20);
                    currentPath.setAttribute('fill', currentColor);
                    currentPath.setAttribute('fill-opacity', '0.4');
                    svg.appendChild(currentPath);
                } else if (currentTool === 'rectangle') {
                    currentPath = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    currentPath.setAttribute('x', startX);
                    currentPath.setAttribute('y', startY);
                    currentPath.setAttribute('width', 0);
                    currentPath.setAttribute('height', 0);
                    currentPath.setAttribute('stroke', currentColor);
                    currentPath.setAttribute('stroke-width', currentSize);
                    currentPath.setAttribute('fill', 'none');
                    svg.appendChild(currentPath);
                } else if (currentTool === 'circle') {
                    currentPath = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                    currentPath.setAttribute('cx', startX);
                    currentPath.setAttribute('cy', startY);
                    currentPath.setAttribute('rx', 0);
                    currentPath.setAttribute('ry', 0);
                    currentPath.setAttribute('stroke', currentColor);
                    currentPath.setAttribute('stroke-width', currentSize);
                    currentPath.setAttribute('fill', 'none');
                    svg.appendChild(currentPath);
                } else if (currentTool === 'arrow') {
                    currentPath = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    currentPath.setAttribute('x1', startX);
                    currentPath.setAttribute('y1', startY);
                    currentPath.setAttribute('x2', startX);
                    currentPath.setAttribute('y2', startY);
                    currentPath.setAttribute('stroke', currentColor);
                    currentPath.setAttribute('stroke-width', currentSize);
                    currentPath.setAttribute('marker-end', 'url(#arrowhead)');
                    svg.appendChild(currentPath);
                } else if (currentTool === 'text') {
                    const text = prompt('Metin girin:');
                    if (text) {
                        const textEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        textEl.setAttribute('x', startX);
                        textEl.setAttribute('y', startY);
                        textEl.setAttribute('fill', currentColor);
                        textEl.setAttribute('font-size', currentSize * 4);
                        textEl.setAttribute('font-family', 'Arial, sans-serif');
                        textEl.textContent = text;
                        svg.appendChild(textEl);
                        saveAnnotation(pageNum, { type: 'text', x: startX, y: startY, text, color: currentColor, size: currentSize * 4 });
                    }
                    isDrawing = false;
                    return;
                } else if (currentTool === 'eraser') {
                    // Find and remove element at click position
                    const elements = svg.querySelectorAll('path, rect, ellipse, line, text');
                    for (let el of elements) {
                        const bbox = el.getBBox();
                        if (startX >= bbox.x && startX <= bbox.x + bbox.width &&
                            startY >= bbox.y && startY <= bbox.y + bbox.height) {
                            el.remove();
                            break;
                        }
                    }
                    isDrawing = false;
                    return;
                }
            });

            svg.addEventListener('mousemove', (e) => {
                if (!isDrawing || !currentPath) return;

                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                if (currentTool === 'pen') {
                    pathData += ` L ${x} ${y}`;
                    currentPath.setAttribute('d', pathData);
                } else if (currentTool === 'highlight') {
                    const w = x - startX;
                    currentPath.setAttribute('width', Math.abs(w));
                    if (w < 0) currentPath.setAttribute('x', x);
                } else if (currentTool === 'rectangle') {
                    const w = x - startX;
                    const h = y - startY;
                    currentPath.setAttribute('width', Math.abs(w));
                    currentPath.setAttribute('height', Math.abs(h));
                    if (w < 0) currentPath.setAttribute('x', x);
                    if (h < 0) currentPath.setAttribute('y', y);
                } else if (currentTool === 'circle') {
                    const rx = Math.abs(x - startX);
                    const ry = Math.abs(y - startY);
                    currentPath.setAttribute('rx', rx);
                    currentPath.setAttribute('ry', ry);
                } else if (currentTool === 'arrow') {
                    currentPath.setAttribute('x2', x);
                    currentPath.setAttribute('y2', y);
                }
            });

            svg.addEventListener('mouseup', () => {
                if (isDrawing && currentPath) {
                    // Save annotation
                    const annotData = {
                        type: currentTool,
                        element: currentPath.outerHTML,
                        color: currentColor,
                        size: currentSize
                    };
                    saveAnnotation(pageNum, annotData);
                }
                isDrawing = false;
                currentPath = null;
            });

            // Add arrowhead marker
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            defs.innerHTML = `
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="${currentColor}"/>
                </marker>
            `;
            svg.appendChild(defs);
        }

        function saveAnnotation(pageNum, annotation) {
            if (!annotations[pageNum]) annotations[pageNum] = [];
            annotations[pageNum].push(annotation);
            undoStack.push({ pageNum, annotation });
            localStorage.setItem('pdfAnnotations', JSON.stringify(annotations));
        }

        function loadPageAnnotations(pageNum, svg) {
            const stored = localStorage.getItem('pdfAnnotations');
            if (stored) {
                const allAnnotations = JSON.parse(stored);
                annotations = allAnnotations;
                const pageAnnots = allAnnotations[pageNum] || [];
                pageAnnots.forEach(annot => {
                    if (annot.element) {
                        svg.innerHTML += annot.element;
                    }
                });
            }
        }

        // Tool selection
        document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
            });
        });

        // Color selection
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentColor = btn.dataset.color;
            });
        });

        // Size slider
        sizeSlider.addEventListener('input', (e) => {
            currentSize = parseInt(e.target.value);
            sizeValue.textContent = currentSize + 'px';
        });

        // Actions
        document.querySelectorAll('.tool-btn[data-action]').forEach(btn => {
            btn.addEventListener('click', () => {
                const action = btn.dataset.action;
                if (action === 'undo') {
                    if (undoStack.length > 0) {
                        const last = undoStack.pop();
                        redoStack.push(last);
                        // Re-render page
                        renderAllPages();
                    }
                } else if (action === 'clear') {
                    if (confirm('Tüm notları silmek istediğinize emin misiniz?')) {
                        annotations = {};
                        localStorage.removeItem('pdfAnnotations');
                        renderAllPages();
                    }
                } else if (action === 'save') {
                    localStorage.setItem('pdfAnnotations', JSON.stringify(annotations));
                    alert('Notlar kaydedildi!');
                }
            });
        });

        // Navigation
        document.getElementById('prev-page').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                pageInput.value = currentPage;
                scrollToPage(currentPage);
            }
        });

        document.getElementById('next-page').addEventListener('click', () => {
            if (currentPage < totalPages) {
                currentPage++;
                pageInput.value = currentPage;
                scrollToPage(currentPage);
            }
        });

        pageInput.addEventListener('change', (e) => {
            const page = parseInt(e.target.value);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                scrollToPage(currentPage);
            }
        });

        function scrollToPage(pageNum) {
            const page = document.querySelector(`.page-container[data-page-number="${pageNum}"]`);
            if (page) {
                page.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // Zoom
        document.getElementById('zoom-in').addEventListener('click', () => {
            currentScale = Math.min(currentScale + 0.25, 3.0);
            zoomLevelSpan.textContent = Math.round(currentScale * 100) + '%';
            renderAllPages();
        });

        document.getElementById('zoom-out').addEventListener('click', () => {
            currentScale = Math.max(currentScale - 0.25, 0.5);
            zoomLevelSpan.textContent = Math.round(currentScale * 100) + '%';
            renderAllPages();
        });

        // Fullscreen
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            const container = document.querySelector('.pdf-container');
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                container.requestFullscreen();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            const shortcuts = {
                'v': 'cursor',
                'h': 'highlight',
                'u': 'underline',
                's': 'strikeout',
                'p': 'pen',
                'e': 'eraser',
                'r': 'rectangle',
                'c': 'circle',
                'a': 'arrow',
                't': 'text',
                'n': 'comment'
            };

            if (shortcuts[e.key]) {
                const btn = document.querySelector(`[data-tool="${shortcuts[e.key]}"]`);
                if (btn) btn.click();
            }

            if (e.ctrlKey && e.key === 'z') {
                document.querySelector('[data-action="undo"]').click();
            }
        });

        console.log('🔒 Secure PDF Viewer with pdf-annotate.js Ready');
    </script>
</body>

</html>
