<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure PDF Viewer V7 (Sidebar + js-draw)</title>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- js-draw (Ready-Made Annotation Library) -->
    <script src="https://cdn.jsdelivr.net/npm/js-draw@1.21.1/dist/bundle.js"></script>

    <!-- Icons & Tooltips -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale.css" />

    <style>
        :root {
            --sidebar-width: 60px;
            --primary: #FFCA28;
            --bg: #121212;
            --surface: #1e1e1e;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
            height: 100vh;
            display: flex;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* LEFT SIDEBAR (V5 Design) */
        .sidebar-toolbar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
            gap: 12px;
            z-index: 100;
        }

        .tool-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            position: relative;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .tool-btn.active {
            background: rgba(255, 202, 40, 0.15);
            color: var(--primary);
        }

        .tool-btn.active::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 10px;
            bottom: 10px;
            width: 3px;
            background: var(--primary);
            border-radius: 0 4px 4px 0;
        }

        .separator {
            width: 24px;
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        .section-label {
            font-size: 9px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        /* Main Layout */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header */
        .top-header {
            height: 48px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 50;
        }

        .header-title {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .page-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            border-radius: 4px;
        }

        .page-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Canvas Area */
        .canvas-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        #pdf-canvas {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* js-draw container - positioned over PDF */
        #jsdraw-container {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        #jsdraw-container.active {
            pointer-events: auto;
        }

        /* Hide js-draw's own toolbar - we use our sidebar */
        .toolbar-root {
            display: none !important;
        }

        /* Upload Overlay */
        #upload-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 60;
        }

        .upload-card {
            width: 400px;
            padding: 60px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-card:hover {
            border-color: var(--primary);
            background: rgba(255, 202, 40, 0.04);
            transform: translateY(-4px);
        }

        /* Color Picker Popup */
        .color-picker-popup {
            position: absolute;
            left: 70px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            display: none;
            gap: 8px;
            flex-wrap: wrap;
            width: 160px;
            z-index: 200;
        }

        .color-picker-popup.show {
            display: flex;
        }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .color-dot:hover {
            transform: scale(1.15);
        }

        .color-dot.active {
            border-color: #fff;
        }

        /* Size Picker */
        .size-picker-popup {
            position: absolute;
            left: 70px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            display: none;
            flex-direction: column;
            gap: 8px;
            z-index: 200;
        }

        .size-picker-popup.show {
            display: flex;
        }

        .size-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            color: #fff;
        }

        .size-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .size-option.active {
            background: rgba(255, 202, 40, 0.2);
        }

        .size-preview {
            background: var(--primary);
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <!-- LEFT SIDEBAR (V5 Design) -->
    <div class="sidebar-toolbar">
        <button class="tool-btn active" id="cursor" data-tippy-content="Select (Pan)">
            <span class="material-icons-round">pan_tool</span>
        </button>

        <div class="separator"></div>
        <span class="section-label">DRAW</span>

        <button class="tool-btn" id="pen" data-tippy-content="Kalem">
            <span class="material-icons-round">brush</span>
        </button>
        <button class="tool-btn" id="highlighter" data-tippy-content="Vurgulayıcı">
            <span class="material-icons-round">border_color</span>
        </button>
        <button class="tool-btn" id="eraser" data-tippy-content="Silgi">
            <span class="material-icons-round">cleaning_services</span>
        </button>

        <div class="separator"></div>
        <span class="section-label">SHAPES</span>

        <button class="tool-btn" id="line" data-tippy-content="Çizgi">
            <span class="material-icons-round">show_chart</span>
        </button>
        <button class="tool-btn" id="arrow" data-tippy-content="Ok">
            <span class="material-icons-round">arrow_right_alt</span>
        </button>
        <button class="tool-btn" id="rect" data-tippy-content="Dikdörtgen">
            <span class="material-icons-round">check_box_outline_blank</span>
        </button>

        <div class="separator"></div>
        <span class="section-label">TEXT</span>

        <button class="tool-btn" id="text" data-tippy-content="Metin">
            <span class="material-icons-round">text_fields</span>
        </button>

        <div class="separator"></div>
        <span class="section-label">OPTIONS</span>

        <button class="tool-btn" id="color-btn" data-tippy-content="Renk">
            <span class="material-icons-round" style="color: #FFCA28;">palette</span>
        </button>
        <button class="tool-btn" id="size-btn" data-tippy-content="Kalınlık">
            <span class="material-icons-round">line_weight</span>
        </button>

        <div style="margin-top:auto"></div>

        <button class="tool-btn" id="undo" data-tippy-content="Geri Al">
            <span class="material-icons-round">undo</span>
        </button>
        <button class="tool-btn" id="redo" data-tippy-content="Yeniden Yap">
            <span class="material-icons-round">redo</span>
        </button>
        <button class="tool-btn" id="clear" data-tippy-content="Temizle">
            <span class="material-icons-round">delete_outline</span>
        </button>

        <!-- Color Picker Popup -->
        <div class="color-picker-popup" id="color-popup">
            <div class="color-dot active" style="background:#FFCA28" data-color="#FFCA28"></div>
            <div class="color-dot" style="background:#FF5252" data-color="#FF5252"></div>
            <div class="color-dot" style="background:#4CAF50" data-color="#4CAF50"></div>
            <div class="color-dot" style="background:#2196F3" data-color="#2196F3"></div>
            <div class="color-dot" style="background:#9C27B0" data-color="#9C27B0"></div>
            <div class="color-dot" style="background:#FF9800" data-color="#FF9800"></div>
            <div class="color-dot" style="background:#FFFFFF" data-color="#FFFFFF"></div>
            <div class="color-dot" style="background:#000000; border: 1px solid #333;" data-color="#000000"></div>
        </div>

        <!-- Size Picker Popup -->
        <div class="size-picker-popup" id="size-popup">
            <div class="size-option active" data-size="2">
                <div class="size-preview" style="width:4px;height:4px;"></div> İnce
            </div>
            <div class="size-option" data-size="4">
                <div class="size-preview" style="width:8px;height:8px;"></div> Normal
            </div>
            <div class="size-option" data-size="8">
                <div class="size-preview" style="width:12px;height:12px;"></div> Kalın
            </div>
            <div class="size-option" data-size="16">
                <div class="size-preview" style="width:18px;height:18px;"></div> Çok Kalın
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-area">
        <!-- Header -->
        <div class="top-header">
            <div class="header-title">
                <span class="material-icons-round" style="color: var(--primary)">lock</span>
                <span id="doc-title">Secure Viewer</span>
            </div>
            <div class="page-controls">
                <button class="page-btn" id="prev"><span class="material-icons-round">chevron_left</span></button>
                <span style="font-size: 13px;">
                    <span id="page-num">1</span> / <span id="page-count">--</span>
                </span>
                <button class="page-btn" id="next"><span class="material-icons-round">chevron_right</span></button>
            </div>
            <div style="display:flex; gap: 8px;">
                <button class="page-btn" id="zoom-out"><span class="material-icons-round">remove</span></button>
                <span id="zoom-val" style="font-size: 13px;">100%</span>
                <button class="page-btn" id="zoom-in"><span class="material-icons-round">add</span></button>
                <div style="width:1px; height:16px; background:var(--border); margin:0 8px;"></div>
                <button class="page-btn" id="fullscreen"><span class="material-icons-round">fullscreen</span></button>
            </div>
        </div>

        <!-- Canvas Area -->
        <div class="canvas-wrapper">
            <canvas id="pdf-canvas"></canvas>
            <div id="jsdraw-container"></div>
        </div>

        <!-- Upload Overlay -->
        <div id="upload-overlay">
            <div class="upload-card" onclick="document.getElementById('fileIn').click()">
                <span class="material-icons-round"
                    style="font-size: 64px; margin-bottom: 24px; color: var(--primary);">upload_file</span>
                <h2 style="font-weight: 400; margin: 0 0 8px 0;">Upload Document</h2>
                <p style="color: rgba(255,255,255,0.5); font-size: 14px; margin: 0;">PDF files supported</p>
                <input type="file" id="fileIn" hidden accept=".pdf">
            </div>
        </div>
    </div>

    <script>
        tippy('[data-tippy-content]', { animation: 'scale', theme: 'translucent', placement: 'right' });

        // PDF.js Worker
        if (window.location.protocol === 'file:') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = '';
        } else {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }

        // State
        let pdfDoc = null;
        let currentPage = 1;
        let scale = 1.5;
        let drawEditor = null;
        let currentColor = '#FFCA28';
        let currentSize = 2;

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const jsdrawContainer = document.getElementById('jsdraw-container');

        // Initialize js-draw Editor
        function initJsDraw() {
            if (drawEditor) return;

            jsdrawContainer.classList.add('active');

            drawEditor = new jsdraw.Editor(jsdrawContainer, {
                background: { type: 'none' } // Transparent background
            });

            // Set initial tool to pen
            drawEditor.toolController.setActiveTool(drawEditor.toolController.PrimaryTool.Pen);

            syncEditorSize();
            console.log('js-draw initialized');
        }

        function syncEditorSize() {
            if (!drawEditor) return;
            const rootEl = drawEditor.getRootElement();
            rootEl.style.width = canvas.width + 'px';
            rootEl.style.height = canvas.height + 'px';

            // Position over canvas
            const canvasRect = canvas.getBoundingClientRect();
            const wrapperRect = document.querySelector('.canvas-wrapper').getBoundingClientRect();
            jsdrawContainer.style.left = (canvasRect.left - wrapperRect.left) + 'px';
            jsdrawContainer.style.top = (canvasRect.top - wrapperRect.top) + 'px';
            jsdrawContainer.style.width = canvas.width + 'px';
            jsdrawContainer.style.height = canvas.height + 'px';
        }

        // Render PDF Page
        async function renderPage(num) {
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale });

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await page.render({
                canvasContext: ctx,
                viewport: viewport
            }).promise;

            document.getElementById('page-num').textContent = num;
            syncEditorSize();
        }

        // Upload Handler
        document.getElementById('fileIn').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('upload-overlay').style.display = 'none';
            document.getElementById('doc-title').textContent = file.name;

            const buf = await file.arrayBuffer();
            pdfDoc = await pdfjsLib.getDocument(buf).promise;

            document.getElementById('page-count').textContent = pdfDoc.numPages;
            currentPage = 1;

            await renderPage(currentPage);
            initJsDraw();
        };

        // SIDEBAR TOOL BUTTONS -> js-draw
        function setActiveTool(toolId) {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(toolId)?.classList.add('active');

            if (!drawEditor) return;

            const tc = drawEditor.toolController;

            switch (toolId) {
                case 'cursor':
                    tc.setActiveTool(tc.PrimaryTool.Selection);
                    jsdrawContainer.classList.remove('active');
                    break;
                case 'pen':
                    tc.setActiveTool(tc.PrimaryTool.Pen);
                    jsdrawContainer.classList.add('active');
                    break;
                case 'highlighter':
                    // Use pen with thick transparent stroke
                    tc.setActiveTool(tc.PrimaryTool.Pen);
                    jsdrawContainer.classList.add('active');
                    break;
                case 'eraser':
                    tc.setActiveTool(tc.PrimaryTool.Eraser);
                    jsdrawContainer.classList.add('active');
                    break;
                case 'text':
                    tc.setActiveTool(tc.PrimaryTool.Text);
                    jsdrawContainer.classList.add('active');
                    break;
                default:
                    jsdrawContainer.classList.add('active');
            }
        }

        // Tool button clicks
        ['cursor', 'pen', 'highlighter', 'eraser', 'line', 'arrow', 'rect', 'text'].forEach(id => {
            document.getElementById(id)?.addEventListener('click', () => setActiveTool(id));
        });

        // Undo/Redo
        document.getElementById('undo')?.addEventListener('click', () => {
            if (drawEditor) drawEditor.history.undo();
        });
        document.getElementById('redo')?.addEventListener('click', () => {
            if (drawEditor) drawEditor.history.redo();
        });
        document.getElementById('clear')?.addEventListener('click', () => {
            if (drawEditor && confirm('Tüm çizimleri silmek istediğinizden emin misiniz?')) {
                drawEditor.dispatchNoAnnounce(drawEditor.image.getContent().clear());
            }
        });

        // Color Picker
        const colorBtn = document.getElementById('color-btn');
        const colorPopup = document.getElementById('color-popup');
        colorBtn?.addEventListener('click', () => {
            colorPopup.classList.toggle('show');
            document.getElementById('size-popup').classList.remove('show');
        });
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                currentColor = dot.dataset.color;
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                colorBtn.querySelector('.material-icons-round').style.color = currentColor;
                colorPopup.classList.remove('show');
                // TODO: Apply color to js-draw
            });
        });

        // Size Picker
        const sizeBtn = document.getElementById('size-btn');
        const sizePopup = document.getElementById('size-popup');
        sizeBtn?.addEventListener('click', () => {
            sizePopup.classList.toggle('show');
            colorPopup.classList.remove('show');
        });
        document.querySelectorAll('.size-option').forEach(opt => {
            opt.addEventListener('click', () => {
                currentSize = parseInt(opt.dataset.size);
                document.querySelectorAll('.size-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                sizePopup.classList.remove('show');
                // TODO: Apply size to js-draw
            });
        });

        // Close popups when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#color-btn') && !e.target.closest('#color-popup')) {
                colorPopup?.classList.remove('show');
            }
            if (!e.target.closest('#size-btn') && !e.target.closest('#size-popup')) {
                sizePopup?.classList.remove('show');
            }
        });

        // Navigation
        document.getElementById('prev').onclick = async () => {
            if (currentPage <= 1) return;
            currentPage--;
            await renderPage(currentPage);
        };
        document.getElementById('next').onclick = async () => {
            if (currentPage >= pdfDoc.numPages) return;
            currentPage++;
            await renderPage(currentPage);
        };

        // Zoom
        document.getElementById('zoom-in').onclick = async () => {
            scale += 0.25;
            document.getElementById('zoom-val').textContent = Math.round(scale * 100 / 1.5) + '%';
            if (pdfDoc) await renderPage(currentPage);
        };
        document.getElementById('zoom-out').onclick = async () => {
            if (scale <= 0.5) return;
            scale -= 0.25;
            document.getElementById('zoom-val').textContent = Math.round(scale * 100 / 1.5) + '%';
            if (pdfDoc) await renderPage(currentPage);
        };
        document.getElementById('fullscreen').onclick = () => {
            if (document.fullscreenElement) document.exitFullscreen();
            else document.body.requestFullscreen();
        };

        console.log('V7 Sidebar + js-draw Loaded');
    </script>
</body>

</html>
